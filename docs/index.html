<div id="root"><div id="boot"><div class="k">Loading demo</div><div>RAG Eval Dashboard を起動中… 初回はPython実行環境の読み込みに数十秒かかります。</div></div></div>
<script type="module">
import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.js";
mount({"requirements": ["scikit-learn", "pandas", "altair"], "entrypoint": "app/streamlit_app.py", "files": {"app/streamlit_app.py": "\"\"\"RAG 評価ダッシュボードの Streamlit エントリポイント。\n\nUI は薄く保ち、計算ロジックは src/ の関数に委ねる。\n\"\"\"\n\nfrom __future__ import annotations\n\nimport sys\nfrom pathlib import Path\n\nimport altair as alt\nimport pandas as pd\nimport streamlit as st\n\nsys.path.insert(0, str(Path(__file__).resolve().parents[1]))\n\nfrom src.answer import build_answer\nfrom src.brand import apply_brand, hero\nfrom src.data import FaqItem, build_corpus, load_eval_questions\nfrom src.evaluate import evaluate_retriever\nfrom src.search import SearchMethod, Searcher\n\nst.set_page_config(\n    page_title=\"RAG 評価ダッシュボード\",\n    page_icon=\"🔎\",\n    layout=\"wide\",\n)\n\n\n@st.cache_data(show_spinner=False)\ndef load_corpus() -> list[FaqItem]:\n    return build_corpus()\n\n\n@st.cache_data(show_spinner=False)\ndef load_questions() -> list:\n    return load_eval_questions()\n\n\n@st.cache_resource(show_spinner=False)\ndef get_searcher(method: str) -> Searcher:\n    return Searcher(load_corpus(), SearchMethod(method))\n\n\ndef render_sidebar() -> dict:\n    st.sidebar.title(\"RAG 評価ダッシュボード\")\n    st.sidebar.caption(\"合成データのデモ（実在の精度・効果を示すものではありません）\")\n\n    method = st.sidebar.radio(\n        \"検索方式\",\n        options=[(\"TF-IDF（cosine）\", \"tfidf\"), (\"BM25 風\", \"bm25\")],\n        format_func=lambda x: x[0],\n        index=0,\n        key=\"method_radio\",\n    )[1]\n\n    top_k = st.sidebar.slider(\n        \"Top-K（根拠表示件数）\",\n        min_value=1,\n        max_value=10,\n        value=5,\n        step=1,\n        key=\"top_k_slider\",\n    )\n\n    mode = st.sidebar.radio(\n        \"質問の選び方\",\n        options=[\"質問セットから選ぶ\", \"カスタムクエリを入力\"],\n        index=0,\n        key=\"mode_radio\",\n    )\n\n    custom_query = \"\"\n    selected_id: str | None = None\n    if mode == \"質問セットから選ぶ\":\n        questions = load_questions()\n        options = {q.id: f\"{q.id}: {q.query}\" for q in questions}\n        selected_id = st.sidebar.selectbox(\n            \"質問を選択\",\n            options=list(options.keys()),\n            format_func=lambda qid: options[qid],\n            key=\"question_select\",\n        )\n    else:\n        custom_query = st.sidebar.text_area(\n            \"カスタムクエリ\",\n            value=\"\",\n            placeholder=\"例: パスワードを忘れた\",\n            height=80,\n        )\n\n    return {\n        \"method\": method,\n        \"top_k\": top_k,\n        \"mode\": mode,\n        \"selected_id\": selected_id,\n        \"custom_query\": custom_query,\n    }\n\n\ndef render_metric_summary(summary) -> None:\n    col1, col2, col3, col4 = st.columns(4)\n    col1.metric(\"評価質問数\", len(summary.per_question))\n    col2.metric(\"平均 Recall@K\", f\"{summary.mean_recall:.3f}\")\n    col3.metric(\"平均 Precision@K\", f\"{summary.mean_precision:.3f}\")\n    col4.metric(\"平均 MRR\", f\"{summary.mean_mrr:.3f}\")\n\n\ndef render_per_question_chart(summary) -> None:\n    if not summary.per_question:\n        st.info(\"評価対象の質問がありません。\")\n        return\n    df = pd.DataFrame(\n        {\n            \"質問ID\": [p.question_id for p in summary.per_question],\n            \"クエリ\": [p.query for p in summary.per_question],\n            \"Recall@K\": [p.recall for p in summary.per_question],\n            \"Precision@K\": [p.precision for p in summary.per_question],\n            \"MRR\": [p.reciprocal_rank for p in summary.per_question],\n        }\n    )\n    chart = (\n        alt.Chart(df)\n        .mark_bar(cornerRadiusEnd=4)\n        .encode(\n            x=alt.X(\"質問ID:O\", sort=None, title=\"質問ID\"),\n            y=alt.Y(\"Recall@K:Q\", scale=alt.Scale(domain=[0, 1]), title=\"Recall@K (0..1)\"),\n            tooltip=[\"質問ID\", \"クエリ\", \"Recall@K\", \"Precision@K\", \"MRR\"],\n        )\n        .properties(width=\"container\", height=280)\n    )\n    st.altair_chart(chart, width=\"stretch\")\n\n\ndef render_results(\n    query: str,\n    results: list,\n    corpus_map: dict[str, FaqItem],\n    relevant_ids: list[str] | None,\n    top_k: int,\n) -> None:\n    if not query.strip():\n        st.warning(\"質問またはクエリを入力してください。\")\n        return\n    if not results:\n        st.info(\"該当するFAQが見つかりませんでした（未知語・空クエリでも落ちない設計）。\")\n        return\n\n    answer = build_answer(query, results, corpus_map)\n    st.subheader(\"生成回答（テンプレート）\")\n    conf = answer.confidence\n    st.markdown(f\"**信頼度（相対）:** `{conf:.2f}` ｜ 根拠: `{answer.source_id}` / {answer.source_title}\")\n    st.info(answer.text)\n\n    st.subheader(f\"根拠ドキュメント（Top-{top_k}）\")\n    rows = []\n    for r in results:\n        item = corpus_map.get(r.faq_id)\n        is_relevant = relevant_ids is not None and r.faq_id in relevant_ids\n        rows.append(\n            {\n                \"順位\": r.rank,\n                \"FAQ ID\": r.faq_id,\n                \"タイトル\": item.title if item else \"（不明）\",\n                \"カテゴリ\": item.category if item else \"—\",\n                \"スコア\": round(r.score, 4),\n                \"正解根拠\": \"○\" if is_relevant else \"\",\n            }\n        )\n    st.dataframe(pd.DataFrame(rows), width=\"stretch\", hide_index=True)\n\n    for r in results:\n        item = corpus_map.get(r.faq_id)\n        if item is None:\n            continue\n        with st.expander(f\"#{r.rank} {item.title} （スコア {r.score:.4f}）\"):\n            st.markdown(f\"**ID:** {item.id} ｜ **カテゴリ:** {item.category}\")\n            st.write(item.body)\n            st.caption(f\"キーワード: {', '.join(item.keywords)}\")\n\n\ndef main() -> None:\n    apply_brand(st)\n    cfg = render_sidebar()\n    corpus = load_corpus()\n    questions = load_questions()\n    corpus_map = {item.id: item for item in corpus}\n\n    searcher = get_searcher(cfg[\"method\"])\n    top_k = cfg[\"top_k\"]\n\n    hero(\n        st,\n        \"RAG Evaluation\",\n        \"RAG 評価ダッシュボード\",\n        \"検索方式（TF-IDF / BM25 風）を切り替えて、検索結果・回答・根拠・評価指標を比較します。\",\n    )\n\n    st.subheader(\"指標サマリー（質問セット全体）\")\n    summary = evaluate_retriever(searcher, questions, top_k=top_k)\n    render_metric_summary(summary)\n    render_per_question_chart(summary)\n\n    st.divider()\n\n    if cfg[\"mode\"] == \"質問セットから選ぶ\":\n        question = next((q for q in questions if q.id == cfg[\"selected_id\"]), None)\n        if question is None:\n            st.warning(\"質問が選択されていません。\")\n            return\n        st.subheader(f\"選択中の質問: {question.id}\")\n        st.markdown(f\"**クエリ:** {question.query}\")\n        st.markdown(f\"**正解根拠:** {', '.join(question.relevant_ids) if question.relevant_ids else '（なし）'}\")\n        results = searcher.search(question.query, top_k=top_k)\n        render_results(question.query, results, corpus_map, question.relevant_ids, top_k)\n    else:\n        st.subheader(\"カスタムクエリ評価\")\n        query = cfg[\"custom_query\"]\n        if not query.strip():\n            st.info(\"サイドバーにカスタムクエリを入力すると、検索結果と回答が表示されます。\")\n            return\n        results = searcher.search(query, top_k=top_k)\n        render_results(query, results, corpus_map, None, top_k)\n\n\nif __name__ == \"__main__\":\n    main()\n", "src/__init__.py": "\"\"\"RAG 評価ダッシュボードのコアロジック。\"\"\"\n\nfrom src.data import build_corpus, load_eval_questions\nfrom src.search import Searcher, SearchMethod\nfrom src.evaluate import evaluate_retriever, recall_at_k, precision_at_k, mrr\nfrom src.answer import build_answer\n\n__all__ = [\n    \"build_corpus\",\n    \"load_eval_questions\",\n    \"Searcher\",\n    \"SearchMethod\",\n    \"evaluate_retriever\",\n    \"recall_at_k\",\n    \"precision_at_k\",\n    \"mrr\",\n    \"build_answer\",\n]\n", "src/answer.py": "\"\"\"テンプレートベースの回答生成。LLM を呼ばず、根拠FAQから回答文を組み立てる。\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\n\nfrom src.data import FaqItem\nfrom src.search import SearchResult\n\n\n@dataclass(frozen=True)\nclass AnswerOutput:\n    \"\"\"回答生成結果。\"\"\"\n\n    text: str\n    source_id: str | None\n    source_title: str | None\n    confidence: float\n\n\ndef _confidence(results: list[SearchResult]) -> float:\n    \"\"\"トップと2番目のスコア比から相対信頼度(0..1)を出す。\"\"\"\n\n    if not results:\n        return 0.0\n    top = results[0].score\n    if len(results) == 1:\n        return 1.0 if top > 0 else 0.0\n    second = results[1].score\n    denom = top + second\n    if denom <= 0:\n        return 0.0\n    return max(0.0, min(1.0, top / denom))\n\n\ndef build_answer(\n    query: str,\n    results: list[SearchResult],\n    corpus_map: dict[str, FaqItem],\n) -> AnswerOutput:\n    \"\"\"クエリと検索結果から回答文を組み立てる。結果が空でも落ちない。\"\"\"\n\n    if not query or not query.strip():\n        return AnswerOutput(\n            text=\"質問を入力してください。\",\n            source_id=None,\n            source_title=None,\n            confidence=0.0,\n        )\n    if not results:\n        return AnswerOutput(\n            text=\"関連するFAQが見つかりませんでした。別のキーワードでお試しください。\",\n            source_id=None,\n            source_title=None,\n            confidence=0.0,\n        )\n\n    top = results[0]\n    item = corpus_map.get(top.faq_id)\n    if item is None:\n        return AnswerOutput(\n            text=\"根拠ドキュメントが特定できませんでした。\",\n            source_id=None,\n            source_title=None,\n            confidence=0.0,\n        )\n\n    confidence = _confidence(results)\n    text = (\n        f\"ご質問「{query}」について、最も関連する情報は「{item.title}」です。\\n\"\n        f\"{item.body}\\n\"\n        f\"（根拠: {item.id} / カテゴリ: {item.category}）\"\n    )\n    return AnswerOutput(\n        text=text,\n        source_id=item.id,\n        source_title=item.title,\n        confidence=confidence,\n    )\n", "src/brand.py": "\"\"\"portfolio-hub と視覚言語を揃える共通ブランドテーマ（Streamlit 用）。\n\n- near-white グラデ背景 / slate 文字 / teal・blue アクセント\n- 半透明の白カード + blur / 8px 角丸 / uppercase キッカー + 大きな見出し\n\n外部依存なし。各アプリの ``streamlit_app.py`` から::\n\n    from src.brand import apply_brand, hero\n    apply_brand(st)          # set_page_config の後に一度だけ\n    hero(st, \"Kicker\", \"タイトル\", \"サブ説明\")\n\"\"\"\n\nfrom __future__ import annotations\n\n_BRAND_CSS = \"\"\"\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');\n\n:root {\n  --bg:#f8fafc; --fg:#0f172a; --muted:rgba(15,23,42,0.66);\n  --surface:rgba(255,255,255,0.82); --line:rgba(15,23,42,0.12);\n  --accent:#0f766e; --accent2:#2563eb;\n  --shadow:0 18px 50px rgba(15,23,42,0.08);\n}\n\n/* typography（アイコンフォントは触らない） */\nhtml, body, .stApp, .stMarkdown, p, li, span, label,\nh1, h2, h3, h4, button, input, textarea, select,\n[data-testid=\"stMetricValue\"], [data-testid=\"stMetricLabel\"],\n[data-testid=\"stWidgetLabel\"] {\n  font-family: 'Inter', system-ui, -apple-system, \"Segoe UI\", sans-serif;\n}\n\n/* 背景グラデ（portfolio-hub .portfolio-shell 相当） */\n.stApp {\n  background:\n    linear-gradient(180deg, rgba(248,250,252,0.92), rgba(241,245,249,0.96) 42%, rgba(15,23,42,0.05)),\n    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.95), rgba(219,234,254,0.55) 42%, rgba(15,23,42,0.06));\n  color: var(--fg);\n}\n\n/* Streamlit クロームを控えめに */\nheader[data-testid=\"stHeader\"] { background: transparent; }\n[data-testid=\"stToolbar\"], #MainMenu, footer { visibility: hidden; height: 0; }\n[data-testid=\"stDecoration\"] { display: none; }\n\n/* 本文幅と余白 */\n.block-container, [data-testid=\"stMainBlockContainer\"] {\n  max-width: 1180px; padding-top: 2.2rem; padding-bottom: 3rem;\n}\n\n/* 見出し */\nh1 { font-weight: 800 !important; letter-spacing: -0.02em; line-height: 1.05; color: var(--fg); }\nh2 { font-weight: 700 !important; letter-spacing: -0.01em; color: var(--fg); }\nh3 { font-weight: 700 !important; color: var(--fg); }\n\n/* Hero ブロック */\n.brand-hero { margin: 6px 0 30px; }\n.brand-kicker {\n  color: var(--accent); font-size: .78rem; font-weight: 700;\n  letter-spacing: .15em; text-transform: uppercase; margin-bottom: 10px;\n}\n.brand-title {\n  font-size: clamp(2.1rem, 5vw, 3.5rem); font-weight: 800;\n  line-height: 1.03; letter-spacing: -0.025em; color: var(--fg); margin: 0;\n}\n.brand-sub {\n  color: var(--muted); font-size: 1.02rem; line-height: 1.8;\n  margin-top: 14px; max-width: 760px;\n}\n\n/* サイドバー = 半透明サーフェス */\n[data-testid=\"stSidebar\"] {\n  background: rgba(255,255,255,0.72); backdrop-filter: blur(16px);\n  border-right: 1px solid var(--line);\n}\n[data-testid=\"stSidebar\"] .brand-kicker { margin-top: 4px; }\n\n/* metric をカード化 */\n[data-testid=\"stMetric\"] {\n  background: var(--surface); border: 1px solid var(--line);\n  border-radius: 12px; padding: 16px 18px; box-shadow: var(--shadow);\n  backdrop-filter: blur(12px);\n}\n[data-testid=\"stMetricValue\"] { color: var(--fg); font-weight: 800; }\n[data-testid=\"stMetricLabel\"] { color: var(--muted); }\n\n/* ボタン = ダークプライマリ */\n.stButton > button, .stDownloadButton > button, .stFormSubmitButton > button {\n  border-radius: 8px; border: 1px solid #0f172a; background: #0f172a;\n  color: #fff; font-weight: 700; padding: 8px 16px;\n  transition: transform .15s ease, background .15s ease;\n}\n.stButton > button:hover, .stDownloadButton > button:hover,\n.stFormSubmitButton > button:hover {\n  background: #020617; transform: translateY(-1px); border-color: #0f172a; color: #fff;\n}\n\n/* タブ */\n.stTabs [data-baseweb=\"tab-list\"] { gap: 6px; border-bottom: 1px solid var(--line); }\n.stTabs [data-baseweb=\"tab\"] { font-weight: 700; color: var(--muted); }\n.stTabs [aria-selected=\"true\"] { color: var(--fg); }\n\n/* 表・expander をカード化 */\n[data-testid=\"stDataFrame\"], [data-testid=\"stTable\"] {\n  border: 1px solid var(--line); border-radius: 12px; overflow: hidden;\n  box-shadow: var(--shadow);\n}\n[data-testid=\"stExpander\"] {\n  border: 1px solid var(--line); border-radius: 12px;\n  background: var(--surface); box-shadow: var(--shadow);\n}\n\n/* 入力の角丸 */\n[data-baseweb=\"select\"] > div, .stTextInput input, .stTextArea textarea,\n.stNumberInput input { border-radius: 8px !important; }\n\n/* 通知・区切り */\n[data-testid=\"stNotification\"], .stAlert { border-radius: 10px; }\nhr { border-color: var(--line); }\n</style>\n\"\"\"\n\n\ndef apply_brand(st) -> None:\n    \"\"\"ブランド CSS を注入する。``st.set_page_config`` の後に一度だけ呼ぶ。\"\"\"\n    st.markdown(_BRAND_CSS, unsafe_allow_html=True)\n\n\ndef _esc(text: str) -> str:\n    return (\n        str(text)\n        .replace(\"&\", \"&amp;\")\n        .replace(\"<\", \"&lt;\")\n        .replace(\">\", \"&gt;\")\n    )\n\n\ndef hero(st, kicker: str, title: str, subtitle: str | None = None) -> None:\n    \"\"\"portfolio-hub 風のヒーロー見出し（キッカー + 大見出し + サブ説明）。\"\"\"\n    html = (\n        '<div class=\"brand-hero\">'\n        f'<div class=\"brand-kicker\">{_esc(kicker)}</div>'\n        f'<div class=\"brand-title\">{_esc(title)}</div>'\n    )\n    if subtitle:\n        html += f'<div class=\"brand-sub\">{_esc(subtitle)}</div>'\n    html += \"</div>\"\n    st.markdown(html, unsafe_allow_html=True)\n", "src/data.py": "\"\"\"合成 SaaS サポート FAQ の生成と永続化。\n\n実在企業 FAQ のコピーではなく、架空の SaaS「CloudFlow」のサポート FAQ を\n乱数シード固定で合成する。生成物は ``data/`` 以下の JSON に保存され、\n以降は同じ内容が再現される。\n\"\"\"\n\nfrom __future__ import annotations\n\nimport json\nimport random\nfrom dataclasses import asdict, dataclass, field\nfrom pathlib import Path\nfrom typing import Any\n\nDATA_DIR = Path(__file__).resolve().parents[1] / \"data\"\nFAQ_PATH = DATA_DIR / \"faq.json\"\nEVAL_PATH = DATA_DIR / \"eval_questions.json\"\n\n\n@dataclass(frozen=True)\nclass FaqItem:\n    \"\"\"FAQ 1件。\"\"\"\n\n    id: str\n    title: str\n    body: str\n    category: str\n    keywords: list[str] = field(default_factory=list)\n\n\n@dataclass(frozen=True)\nclass EvalQuestion:\n    \"\"\"評価用の検索クエリとその正解根拠。\"\"\"\n\n    id: str\n    query: str\n    relevant_ids: list[str] = field(default_factory=list)\n\n\ndef _synthetic_faq(seed: int) -> list[FaqItem]:\n    \"\"\"乱数シード固定で架空 FAQ を生成する。\"\"\"\n\n    rng = random.Random(seed)\n\n    base: list[dict[str, Any]] = [\n        {\n            \"id\": \"faq_001\",\n            \"title\": \"アカウント登録の手順\",\n            \"category\": \"アカウント\",\n            \"keywords\": [\"アカウント\", \"登録\", \"サインアップ\", \"始め方\"],\n            \"body\": (\n                \"CloudFlow への登録は公式サイトの「無料ではじめる」ボタンから行えます。\"\n                \"メールアドレスとパスワードを入力し、確認メールのリンクをクリックすると\"\n                \"アカウントが有効化されます。\"\n            ),\n        },\n        {\n            \"id\": \"faq_002\",\n            \"title\": \"パスワードを忘れた場合のリセット手順\",\n            \"category\": \"アカウント\",\n            \"keywords\": [\"パスワード\", \"リセット\", \"忘れた\", \"再設定\", \"ログイン\"],\n            \"body\": (\n                \"ログイン画面の「パスワードをお忘れですか？」から登録メールアドレスを入力すると、\"\n                \"リセット用リンクが送信されます。リンクの有効期限は30分です。\"\n            ),\n        },\n        {\n            \"id\": \"faq_003\",\n            \"title\": \"料金プランの変更とダウングレード\",\n            \"category\": \"契約・請求\",\n            \"keywords\": [\"料金\", \"プラン\", \"変更\", \"ダウングレード\", \"アップグレード\", \"課金\"],\n            \"body\": (\n                \"プラン変更は設定の「プランと請求」から行えます。アップグレードは即時反映、\"\n                \"ダウングレードは次回更新日に適用されます。\"\n            ),\n        },\n        {\n            \"id\": \"faq_004\",\n            \"title\": \"請求書と領収書のダウンロード\",\n            \"category\": \"契約・請求\",\n            \"keywords\": [\"請求書\", \"領収書\", \"ダウンロード\", \"インボイス\", \"pdf\"],\n            \"body\": (\n                \"過去の請求書は「プランと請求 > 請求履歴」から PDF 形式でダウンロードできます。\"\n                \"領収書の宛名指定も同画面から編集可能です。\"\n            ),\n        },\n        {\n            \"id\": \"faq_005\",\n            \"title\": \"API のレート制限とクォータ\",\n            \"category\": \"API\",\n            \"keywords\": [\"api\", \"レート制限\", \"上限\", \"クォータ\", \"429\", \"呼び出し回数\"],\n            \"body\": (\n                \"API の呼び出しはプランごとに1分あたりの上限が設定されています。\"\n                \"上限に達すると HTTP 429 が返却され、Retry-After ヘッダーの秒数を待つ必要があります。\"\n            ),\n        },\n        {\n            \"id\": \"faq_006\",\n            \"title\": \"データのエクスポート形式\",\n            \"category\": \"データ\",\n            \"keywords\": [\"エクスポート\", \"データ\", \"csv\", \"json\", \"書き出し\"],\n            \"body\": (\n                \"データは設定の「データエクスポート」から CSV または JSON 形式で出力できます。\"\n                \"大容量の場合はバックグラウンド処理となり、完了後にダウンロードリンクが発行されます。\"\n            ),\n        },\n        {\n            \"id\": \"faq_007\",\n            \"title\": \"二要素認証の設定手順\",\n            \"category\": \"セキュリティ\",\n            \"keywords\": [\"二要素認証\", \"2fa\", \"mfa\", \"ワンタイムパスワード\", \"認証アプリ\"],\n            \"body\": (\n                \"セキュリティ設定の「二要素認証」から認証アプリを登録できます。\"\n                \"QRコードをアプリで読み取り、6桁のコードを入力して有効化します。\"\n            ),\n        },\n        {\n            \"id\": \"faq_008\",\n            \"title\": \"チームメンバーの招待と権限\",\n            \"category\": \"チーム管理\",\n            \"keywords\": [\"チーム\", \"メンバー\", \"招待\", \"権限\", \"ロール\", \"ユーザー\"],\n            \"body\": (\n                \"チーム設定の「メンバー」からメールアドレスで招待できます。\"\n                \"ロールは管理者・編集者・閲覧者の3種類で、プロジェクトごとに割り当て可能です。\"\n            ),\n        },\n        {\n            \"id\": \"faq_009\",\n            \"title\": \"サードパーティ連携の追加\",\n            \"category\": \"連携\",\n            \"keywords\": [\"連携\", \"integration\", \"slack\", \"zapier\", \"webhook\", \"サードパーティ\"],\n            \"body\": (\n                \"連携マーケットから Slack や Zapier などを追加できます。\"\n                \"連携ごとにスコープを限定したアクセストークンが発行されます。\"\n            ),\n        },\n        {\n            \"id\": \"faq_010\",\n            \"title\": \"監査ログの取得期間\",\n            \"category\": \"セキュリティ\",\n            \"keywords\": [\"監査ログ\", \"操作履歴\", \"audit\", \"取得期間\", \"証跡\"],\n            \"body\": (\n                \"監査ログはエンタープライズプランで直近12ヶ月分を取得できます。\"\n                \"CSV エクスポートも可能で、ユーザー・アクション・日時で絞り込めます。\"\n            ),\n        },\n        {\n            \"id\": \"faq_011\",\n            \"title\": \"ダッシュボードのカスタマイズ\",\n            \"category\": \"UI\",\n            \"keywords\": [\"ダッシュボード\", \"カスタマイズ\", \"ウィジェット\", \"レイアウト\", \"表示\"],\n            \"body\": (\n                \"ダッシュボードはウィジェット単位で追加・移動が可能です。\"\n                \"保存したレイアウトは個人のみに適用され、チーム共有は別途設定が必要です。\"\n            ),\n        },\n        {\n            \"id\": \"faq_012\",\n            \"title\": \"通知設定とチャネル指定\",\n            \"category\": \"通知\",\n            \"keywords\": [\"通知\", \"アラート\", \"メール\", \"チャネル\", \"設定\"],\n            \"body\": (\n                \"通知はイベントごとにメール・Slack・アプリ内のチャネルを選択できます。\"\n                \"重大度に応じて送信頻度を調整する設定も用意されています。\"\n            ),\n        },\n        {\n            \"id\": \"faq_013\",\n            \"title\": \"データの保持期間と削除\",\n            \"category\": \"データ\",\n            \"keywords\": [\"保持期間\", \"削除\", \"データ\", \"ガバナンス\", \"保存\"],\n            \"body\": (\n                \"データの保持期間は既定で24ヶ月です。設定から短縮でき、\"\n                \"削除リクエストは実行から30日後に物理削除されます。\"\n            ),\n        },\n        {\n            \"id\": \"faq_014\",\n            \"title\": \"サポートへの問い合わせ方法\",\n            \"category\": \"サポート\",\n            \"keywords\": [\"サポート\", \"問い合わせ\", \"ヘルプ\", \"コンタクト\", \"対応\"],\n            \"body\": (\n                \"アプリ内のヘルプアイコンからチャットで問い合わせできます。\"\n                \"エンタープライズプランでは専用メールと優先レスポンスが利用可能です。\"\n            ),\n        },\n        {\n            \"id\": \"faq_015\",\n            \"title\": \"計画メンテナンスのスケジュール\",\n            \"category\": \"運用\",\n            \"keywords\": [\"メンテナンス\", \"停止\", \"スケジュール\", \"障害\", \"稼働時間\"],\n            \"body\": (\n                \"計画メンテナンスは月1回、日曜の深夜に実施し、ステータスページで事前告知します。\"\n                \"影響範囲は読み取り機能の一時利用不可のみです。\"\n            ),\n        },\n    ]\n\n    items: list[FaqItem] = []\n    for entry in base:\n        title = entry[\"title\"]\n        body = entry[\"body\"]\n        if rng.random() < 0.0:\n            body = body\n        items.append(\n            FaqItem(\n                id=entry[\"id\"],\n                title=title,\n                body=body,\n                category=entry[\"category\"],\n                keywords=list(entry[\"keywords\"]),\n            )\n        )\n    return items\n\n\ndef _synthetic_eval_questions() -> list[EvalQuestion]:\n    \"\"\"評価用クエリと正解根拠を定義する。\"\"\"\n\n    return [\n        EvalQuestion(\"q_01\", \"パスワードを忘れてログインできない\", [\"faq_002\"]),\n        EvalQuestion(\"q_02\", \"請求書を PDF でダウンロードしたい\", [\"faq_004\"]),\n        EvalQuestion(\"q_03\", \"API の呼び出し回数の上限を知りたい\", [\"faq_005\"]),\n        EvalQuestion(\"q_04\", \"データを CSV や JSON で書き出したい\", [\"faq_006\"]),\n        EvalQuestion(\"q_05\", \"二段階認証を有効にしたい\", [\"faq_007\"]),\n        EvalQuestion(\"q_06\", \"チームにメンバーを招待したい\", [\"faq_008\"]),\n        EvalQuestion(\"q_07\", \"Slack との連携を追加したい\", [\"faq_009\"]),\n        EvalQuestion(\"q_08\", \"過去の操作履歴を確認したい\", [\"faq_010\"]),\n        EvalQuestion(\"q_09\", \"プランを安いものに変更したい\", [\"faq_003\"]),\n        EvalQuestion(\"q_10\", \"通知をメール以外にしたい\", [\"faq_012\"]),\n        EvalQuestion(\"q_11\", \"データの保持期間はどれくらいか\", [\"faq_013\"]),\n        EvalQuestion(\"q_12\", \"メンテナンスで止まる時間を知りたい\", [\"faq_015\"]),\n    ]\n\n\ndef _ensure_data_files(seed: int = 42) -> None:\n    \"\"\"data/ に FAQ と評価質問が無ければ生成して保存する。\"\"\"\n\n    DATA_DIR.mkdir(parents=True, exist_ok=True)\n    if not FAQ_PATH.exists():\n        items = _synthetic_faq(seed)\n        FAQ_PATH.write_text(\n            json.dumps([asdict(i) for i in items], ensure_ascii=False, indent=2),\n            encoding=\"utf-8\",\n        )\n    if not EVAL_PATH.exists():\n        qs = _synthetic_eval_questions()\n        EVAL_PATH.write_text(\n            json.dumps([asdict(q) for q in qs], ensure_ascii=False, indent=2),\n            encoding=\"utf-8\",\n        )\n\n\ndef build_corpus(seed: int = 42) -> list[FaqItem]:\n    \"\"\"FAQ コーパスを読み込み、無ければ生成して返す。\"\"\"\n\n    _ensure_data_files(seed)\n    raw = json.loads(FAQ_PATH.read_text(encoding=\"utf-8\"))\n    return [FaqItem(**entry) for entry in raw]\n\n\ndef load_eval_questions(seed: int = 42) -> list[EvalQuestion]:\n    \"\"\"評価用質問セットを読み込み、無ければ生成して返す。\"\"\"\n\n    _ensure_data_files(seed)\n    raw = json.loads(EVAL_PATH.read_text(encoding=\"utf-8\"))\n    return [EvalQuestion(**entry) for entry in raw]\n\n\ndef rebuild_data(seed: int = 42) -> tuple[list[FaqItem], list[EvalQuestion]]:\n    \"\"\"data/ を強制的に再生成する（テスト・再現用途）。\"\"\"\n\n    DATA_DIR.mkdir(parents=True, exist_ok=True)\n    items = _synthetic_faq(seed)\n    FAQ_PATH.write_text(\n        json.dumps([asdict(i) for i in items], ensure_ascii=False, indent=2),\n        encoding=\"utf-8\",\n    )\n    qs = _synthetic_eval_questions()\n    EVAL_PATH.write_text(\n        json.dumps([asdict(q) for q in qs], ensure_ascii=False, indent=2),\n        encoding=\"utf-8\",\n    )\n    return items, qs\n", "src/evaluate.py": "\"\"\"検索結果の評価指標。recall@k / precision@k / MRR。\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\n\nfrom src.data import EvalQuestion\nfrom src.search import SearchResult, Searcher\n\n\ndef recall_at_k(retrieved_ids: list[str], relevant_ids: list[str]) -> float:\n    \"\"\"recall@k = |正解 ∩ 検索結果| / |正解|。正解が空なら 0。\"\"\"\n\n    if not relevant_ids:\n        return 0.0\n    hit = len(set(retrieved_ids) & set(relevant_ids))\n    return hit / len(set(relevant_ids))\n\n\ndef precision_at_k(retrieved_ids: list[str], relevant_ids: list[str]) -> float:\n    \"\"\"precision@k = |正解 ∩ 検索結果| / k。k=0 のとき 0。\"\"\"\n\n    if not retrieved_ids:\n        return 0.0\n    hit = len(set(retrieved_ids) & set(relevant_ids))\n    return hit / len(retrieved_ids)\n\n\ndef mrr(retrieved_ids: list[str], relevant_ids: list[str]) -> float:\n    \"\"\"MRR = 1 / (最初の正解の順位)。正解が無ければ 0。\"\"\"\n\n    rel_set = set(relevant_ids)\n    for rank, rid in enumerate(retrieved_ids, start=1):\n        if rid in rel_set:\n            return 1.0 / rank\n    return 0.0\n\n\n@dataclass(frozen=True)\nclass QuestionEval:\n    \"\"\"1質問あたりの評価結果。\"\"\"\n\n    question_id: str\n    query: str\n    retrieved_ids: list[str]\n    relevant_ids: list[str]\n    recall: float\n    precision: float\n    reciprocal_rank: float\n    hit_ranks: list[int] = field(default_factory=list)\n\n\n@dataclass(frozen=True)\nclass EvalSummary:\n    \"\"\"質問セット全体の評価サマリー。\"\"\"\n\n    top_k: int\n    mean_recall: float\n    mean_precision: float\n    mean_mrr: float\n    per_question: list[QuestionEval]\n\n\ndef _hit_ranks(retrieved_ids: list[str], relevant_ids: list[str]) -> list[int]:\n    rel_set = set(relevant_ids)\n    return [rank for rank, rid in enumerate(retrieved_ids, start=1) if rid in rel_set]\n\n\ndef evaluate_retriever(\n    searcher: Searcher,\n    questions: list[EvalQuestion],\n    top_k: int = 5,\n) -> EvalSummary:\n    \"\"\"検索器を全質問で評価しサマリーを返す。空の質問セットでも落ちない。\"\"\"\n\n    per_question: list[QuestionEval] = []\n    for q in questions:\n        results: list[SearchResult] = searcher.search(q.query, top_k=top_k)\n        retrieved_ids = [r.faq_id for r in results]\n        per_question.append(\n            QuestionEval(\n                question_id=q.id,\n                query=q.query,\n                retrieved_ids=retrieved_ids,\n                relevant_ids=list(q.relevant_ids),\n                recall=recall_at_k(retrieved_ids, q.relevant_ids),\n                precision=precision_at_k(retrieved_ids, q.relevant_ids),\n                reciprocal_rank=mrr(retrieved_ids, q.relevant_ids),\n                hit_ranks=_hit_ranks(retrieved_ids, q.relevant_ids),\n            )\n        )\n\n    n = max(len(per_question), 1)\n    mean_recall = sum(p.recall for p in per_question) / n\n    mean_precision = sum(p.precision for p in per_question) / n\n    mean_mrr = sum(p.reciprocal_rank for p in per_question) / n\n    return EvalSummary(\n        top_k=top_k,\n        mean_recall=mean_recall,\n        mean_precision=mean_precision,\n        mean_mrr=mean_mrr,\n        per_question=per_question,\n    )\n", "src/search.py": "\"\"\"検索方式の実装。TF-IDF（cosine 類似度）と BM25 風スコアリング。\n\n両方式とも同じ文字 n-gram トークナイザを用いるため、検索方式の違いが\nランキングに与える影響を公平に比較できる。\n\"\"\"\n\nfrom __future__ import annotations\n\nimport math\nfrom dataclasses import dataclass\nfrom enum import Enum\n\nimport numpy as np\nfrom sklearn.feature_extraction.text import CountVectorizer, TfidfVectorizer\n\nfrom src.data import FaqItem\n\n\nclass SearchMethod(str, Enum):\n    \"\"\"検索方式。\"\"\"\n\n    TFIDF = \"tfidf\"\n    BM25 = \"bm25\"\n\n\n@dataclass(frozen=True)\nclass SearchResult:\n    \"\"\"検索結果1件。\"\"\"\n\n    rank: int\n    faq_id: str\n    score: float\n\n\ndef _document_text(item: FaqItem) -> str:\n    \"\"\"検索対象テキストを組み立てる。\"\"\"\n\n    return f\"{item.title} {item.body} {' '.join(item.keywords)}\"\n\n\ndef _char_ngram_tokenizer(text: str) -> list[str]:\n    \"\"\"文字 2-3 gram の簡易トークナイザ。\"\"\"\n\n    chars = list(text)\n    tokens: list[str] = []\n    for n in (2, 3):\n        for i in range(len(chars) - n + 1):\n            tokens.append(\"\".join(chars[i : i + n]))\n    return tokens\n\n\nclass Searcher:\n    \"\"\"コーパスから検索インデックスを構築しクエリを検索する。\"\"\"\n\n    def __init__(self, corpus: list[FaqItem], method: SearchMethod = SearchMethod.TFIDF) -> None:\n        if not corpus:\n            raise ValueError(\"コーパスが空です\")\n        self._corpus = corpus\n        self._ids = [item.id for item in corpus]\n        self._method = method\n        self._docs = [_document_text(item) for item in corpus]\n        self._build_index()\n\n    def _build_index(self) -> None:\n        if self._method == SearchMethod.TFIDF:\n            self._vectorizer = TfidfVectorizer(\n                analyzer=\"char\",\n                ngram_range=(2, 3),\n                lowercase=False,\n                token_pattern=None,\n            )\n            self._doc_matrix = self._vectorizer.fit_transform(self._docs).toarray()\n        elif self._method == SearchMethod.BM25:\n            self._count_vectorizer = CountVectorizer(\n                analyzer=\"char\",\n                ngram_range=(2, 3),\n                lowercase=False,\n                token_pattern=None,\n            )\n            self._count_matrix = self._count_vectorizer.fit_transform(self._docs).toarray()\n            self._vocab = self._count_vectorizer.get_feature_names_out()\n            self._doc_lens = self._count_matrix.sum(axis=1).astype(float)\n            self._avgdl = float(self._doc_lens.mean()) if len(self._docs) else 1.0\n            self._k1 = 1.5\n            self._b = 0.75\n            n_docs = len(self._docs)\n            df = (self._count_matrix > 0).sum(axis=0).astype(float)\n            df_safe = np.where(df == 0, 1e-9, df)\n            self._idf = np.log((n_docs - df + 0.5) / (df_safe + 0.5) + 1.0)\n        else:  # pragma: no cover - enum で到達不能\n            raise ValueError(f\"未知の検索方式: {self._method}\")\n\n    def _score_tfidf(self, query: str) -> np.ndarray:\n        query_vec = self._vectorizer.transform([query]).toarray()[0]\n        if query_vec.sum() == 0:\n            return np.zeros(len(self._docs))\n        doc_norms = np.linalg.norm(self._doc_matrix, axis=1)\n        q_norm = np.linalg.norm(query_vec)\n        denom = doc_norms * q_norm\n        denom_safe = np.where(denom == 0, 1e-9, denom)\n        return (self._doc_matrix @ query_vec) / denom_safe\n\n    def _score_bm25(self, query: str) -> np.ndarray:\n        query_vec = self._count_vectorizer.transform([query]).toarray()[0]\n        if query_vec.sum() == 0:\n            return np.zeros(len(self._docs))\n        scores = np.zeros(len(self._docs))\n        term_idx = np.where(query_vec > 0)[0]\n        for idx in term_idx:\n            tf = self._count_matrix[:, idx]\n            denom = tf + self._k1 * (1 - self._b + self._b * self._doc_lens / max(self._avgdl, 1e-9))\n            term_scores = self._idf[idx] * (tf * (self._k1 + 1)) / np.where(denom == 0, 1e-9, denom)\n            scores += term_scores\n        return scores\n\n    def search(self, query: str, top_k: int = 5) -> list[SearchResult]:\n        \"\"\"クエリを検索し Top-K を返す。空クエリや未知語でも空リストを返す。\"\"\"\n\n        if query is None or not query.strip():\n            return []\n        if top_k <= 0:\n            return []\n\n        if self._method == SearchMethod.TFIDF:\n            scores = self._score_tfidf(query)\n        else:\n            scores = self._score_bm25(query)\n\n        if scores.sum() == 0:\n            return []\n\n        order = np.argsort(-scores)\n        results: list[SearchResult] = []\n        for rank, doc_idx in enumerate(order, start=1):\n            if rank > top_k:\n                break\n            score = float(scores[doc_idx])\n            if not math.isfinite(score) or score <= 0:\n                continue\n            results.append(SearchResult(rank=rank, faq_id=self._ids[doc_idx], score=score))\n        return results\n", ".streamlit/config.toml": "[theme]\nbase = \"light\"\nprimaryColor = \"#0f766e\"\nbackgroundColor = \"#f8fafc\"\nsecondaryBackgroundColor = \"#ffffff\"\ntextColor = \"#0f172a\"\nfont = \"sans serif\"\n", "data/eval_questions.json": "[\n  {\n    \"id\": \"q_01\",\n    \"query\": \"パスワードを忘れてログインできない\",\n    \"relevant_ids\": [\n      \"faq_002\"\n    ]\n  },\n  {\n    \"id\": \"q_02\",\n    \"query\": \"請求書を PDF でダウンロードしたい\",\n    \"relevant_ids\": [\n      \"faq_004\"\n    ]\n  },\n  {\n    \"id\": \"q_03\",\n    \"query\": \"API の呼び出し回数の上限を知りたい\",\n    \"relevant_ids\": [\n      \"faq_005\"\n    ]\n  },\n  {\n    \"id\": \"q_04\",\n    \"query\": \"データを CSV や JSON で書き出したい\",\n    \"relevant_ids\": [\n      \"faq_006\"\n    ]\n  },\n  {\n    \"id\": \"q_05\",\n    \"query\": \"二段階認証を有効にしたい\",\n    \"relevant_ids\": [\n      \"faq_007\"\n    ]\n  },\n  {\n    \"id\": \"q_06\",\n    \"query\": \"チームにメンバーを招待したい\",\n    \"relevant_ids\": [\n      \"faq_008\"\n    ]\n  },\n  {\n    \"id\": \"q_07\",\n    \"query\": \"Slack との連携を追加したい\",\n    \"relevant_ids\": [\n      \"faq_009\"\n    ]\n  },\n  {\n    \"id\": \"q_08\",\n    \"query\": \"過去の操作履歴を確認したい\",\n    \"relevant_ids\": [\n      \"faq_010\"\n    ]\n  },\n  {\n    \"id\": \"q_09\",\n    \"query\": \"プランを安いものに変更したい\",\n    \"relevant_ids\": [\n      \"faq_003\"\n    ]\n  },\n  {\n    \"id\": \"q_10\",\n    \"query\": \"通知をメール以外にしたい\",\n    \"relevant_ids\": [\n      \"faq_012\"\n    ]\n  },\n  {\n    \"id\": \"q_11\",\n    \"query\": \"データの保持期間はどれくらいか\",\n    \"relevant_ids\": [\n      \"faq_013\"\n    ]\n  },\n  {\n    \"id\": \"q_12\",\n    \"query\": \"メンテナンスで止まる時間を知りたい\",\n    \"relevant_ids\": [\n      \"faq_015\"\n    ]\n  }\n]", "data/faq.json": "[\n  {\n    \"id\": \"faq_001\",\n    \"title\": \"アカウント登録の手順\",\n    \"body\": \"CloudFlow への登録は公式サイトの「無料ではじめる」ボタンから行えます。メールアドレスとパスワードを入力し、確認メールのリンクをクリックするとアカウントが有効化されます。\",\n    \"category\": \"アカウント\",\n    \"keywords\": [\n      \"アカウント\",\n      \"登録\",\n      \"サインアップ\",\n      \"始め方\"\n    ]\n  },\n  {\n    \"id\": \"faq_002\",\n    \"title\": \"パスワードを忘れた場合のリセット手順\",\n    \"body\": \"ログイン画面の「パスワードをお忘れですか？」から登録メールアドレスを入力すると、リセット用リンクが送信されます。リンクの有効期限は30分です。\",\n    \"category\": \"アカウント\",\n    \"keywords\": [\n      \"パスワード\",\n      \"リセット\",\n      \"忘れた\",\n      \"再設定\",\n      \"ログイン\"\n    ]\n  },\n  {\n    \"id\": \"faq_003\",\n    \"title\": \"料金プランの変更とダウングレード\",\n    \"body\": \"プラン変更は設定の「プランと請求」から行えます。アップグレードは即時反映、ダウングレードは次回更新日に適用されます。\",\n    \"category\": \"契約・請求\",\n    \"keywords\": [\n      \"料金\",\n      \"プラン\",\n      \"変更\",\n      \"ダウングレード\",\n      \"アップグレード\",\n      \"課金\"\n    ]\n  },\n  {\n    \"id\": \"faq_004\",\n    \"title\": \"請求書と領収書のダウンロード\",\n    \"body\": \"過去の請求書は「プランと請求 > 請求履歴」から PDF 形式でダウンロードできます。領収書の宛名指定も同画面から編集可能です。\",\n    \"category\": \"契約・請求\",\n    \"keywords\": [\n      \"請求書\",\n      \"領収書\",\n      \"ダウンロード\",\n      \"インボイス\",\n      \"pdf\"\n    ]\n  },\n  {\n    \"id\": \"faq_005\",\n    \"title\": \"API のレート制限とクォータ\",\n    \"body\": \"API の呼び出しはプランごとに1分あたりの上限が設定されています。上限に達すると HTTP 429 が返却され、Retry-After ヘッダーの秒数を待つ必要があります。\",\n    \"category\": \"API\",\n    \"keywords\": [\n      \"api\",\n      \"レート制限\",\n      \"上限\",\n      \"クォータ\",\n      \"429\",\n      \"呼び出し回数\"\n    ]\n  },\n  {\n    \"id\": \"faq_006\",\n    \"title\": \"データのエクスポート形式\",\n    \"body\": \"データは設定の「データエクスポート」から CSV または JSON 形式で出力できます。大容量の場合はバックグラウンド処理となり、完了後にダウンロードリンクが発行されます。\",\n    \"category\": \"データ\",\n    \"keywords\": [\n      \"エクスポート\",\n      \"データ\",\n      \"csv\",\n      \"json\",\n      \"書き出し\"\n    ]\n  },\n  {\n    \"id\": \"faq_007\",\n    \"title\": \"二要素認証の設定手順\",\n    \"body\": \"セキュリティ設定の「二要素認証」から認証アプリを登録できます。QRコードをアプリで読み取り、6桁のコードを入力して有効化します。\",\n    \"category\": \"セキュリティ\",\n    \"keywords\": [\n      \"二要素認証\",\n      \"2fa\",\n      \"mfa\",\n      \"ワンタイムパスワード\",\n      \"認証アプリ\"\n    ]\n  },\n  {\n    \"id\": \"faq_008\",\n    \"title\": \"チームメンバーの招待と権限\",\n    \"body\": \"チーム設定の「メンバー」からメールアドレスで招待できます。ロールは管理者・編集者・閲覧者の3種類で、プロジェクトごとに割り当て可能です。\",\n    \"category\": \"チーム管理\",\n    \"keywords\": [\n      \"チーム\",\n      \"メンバー\",\n      \"招待\",\n      \"権限\",\n      \"ロール\",\n      \"ユーザー\"\n    ]\n  },\n  {\n    \"id\": \"faq_009\",\n    \"title\": \"サードパーティ連携の追加\",\n    \"body\": \"連携マーケットから Slack や Zapier などを追加できます。連携ごとにスコープを限定したアクセストークンが発行されます。\",\n    \"category\": \"連携\",\n    \"keywords\": [\n      \"連携\",\n      \"integration\",\n      \"slack\",\n      \"zapier\",\n      \"webhook\",\n      \"サードパーティ\"\n    ]\n  },\n  {\n    \"id\": \"faq_010\",\n    \"title\": \"監査ログの取得期間\",\n    \"body\": \"監査ログはエンタープライズプランで直近12ヶ月分を取得できます。CSV エクスポートも可能で、ユーザー・アクション・日時で絞り込めます。\",\n    \"category\": \"セキュリティ\",\n    \"keywords\": [\n      \"監査ログ\",\n      \"操作履歴\",\n      \"audit\",\n      \"取得期間\",\n      \"証跡\"\n    ]\n  },\n  {\n    \"id\": \"faq_011\",\n    \"title\": \"ダッシュボードのカスタマイズ\",\n    \"body\": \"ダッシュボードはウィジェット単位で追加・移動が可能です。保存したレイアウトは個人のみに適用され、チーム共有は別途設定が必要です。\",\n    \"category\": \"UI\",\n    \"keywords\": [\n      \"ダッシュボード\",\n      \"カスタマイズ\",\n      \"ウィジェット\",\n      \"レイアウト\",\n      \"表示\"\n    ]\n  },\n  {\n    \"id\": \"faq_012\",\n    \"title\": \"通知設定とチャネル指定\",\n    \"body\": \"通知はイベントごとにメール・Slack・アプリ内のチャネルを選択できます。重大度に応じて送信頻度を調整する設定も用意されています。\",\n    \"category\": \"通知\",\n    \"keywords\": [\n      \"通知\",\n      \"アラート\",\n      \"メール\",\n      \"チャネル\",\n      \"設定\"\n    ]\n  },\n  {\n    \"id\": \"faq_013\",\n    \"title\": \"データの保持期間と削除\",\n    \"body\": \"データの保持期間は既定で24ヶ月です。設定から短縮でき、削除リクエストは実行から30日後に物理削除されます。\",\n    \"category\": \"データ\",\n    \"keywords\": [\n      \"保持期間\",\n      \"削除\",\n      \"データ\",\n      \"ガバナンス\",\n      \"保存\"\n    ]\n  },\n  {\n    \"id\": \"faq_014\",\n    \"title\": \"サポートへの問い合わせ方法\",\n    \"body\": \"アプリ内のヘルプアイコンからチャットで問い合わせできます。エンタープライズプランでは専用メールと優先レスポンスが利用可能です。\",\n    \"category\": \"サポート\",\n    \"keywords\": [\n      \"サポート\",\n      \"問い合わせ\",\n      \"ヘルプ\",\n      \"コンタクト\",\n      \"対応\"\n    ]\n  },\n  {\n    \"id\": \"faq_015\",\n    \"title\": \"計画メンテナンスのスケジュール\",\n    \"body\": \"計画メンテナンスは月1回、日曜の深夜に実施し、ステータスページで事前告知します。影響範囲は読み取り機能の一時利用不可のみです。\",\n    \"category\": \"運用\",\n    \"keywords\": [\n      \"メンテナンス\",\n      \"停止\",\n      \"スケジュール\",\n      \"障害\",\n      \"稼働時間\"\n    ]\n  }\n]"}}, document.getElementById("root"));
